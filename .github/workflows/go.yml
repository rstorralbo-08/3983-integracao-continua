# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Continous Integration Go

on:
  pull_request:
    branches: [ "main" ]
  push: 
    branches: [ "main" ]

jobs:

  ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Inicia BD
      run: docker compose up -d postgres

    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
        args: controllers/ database/ models/ routes/
      
    - name: Test
      run: DB_HOST=${{ secrets.DB_HOST }} DB_PORT=${{ secrets.DB_PORT }} DB_NAME=${{ secrets.DB_NAME }} DB_USER=${{ secrets.DB_USER }} DB_PASSWORD=${{ secrets.DB_PASSWORD }} go test -v main_test.go

    - name: Build
      run: go build main.go

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: go-app
        path: main
